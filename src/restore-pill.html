<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mostrar agenda</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: transparent;
        font-family: "Segoe UI", system-ui, sans-serif;
      }
      #restore-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        border: none;
        border-radius: 3px;
        cursor: pointer;
        font-size: 0.55rem;
        line-height: 1;
        color: #e8eaef;
        background: rgba(26, 29, 38, 0.92);
        box-shadow: 0 1px 6px rgba(0, 0, 0, 0.35);
      }
      #restore-btn:hover {
        background: rgba(34, 38, 47, 0.95);
      }
      #restore-btn:active {
        transform: scale(0.96);
      }
    </style>
    <script type="module" src="/restore-pill.js" defer></script>
  </head>
  <body>
    <button type="button" id="restore-btn" title="Mostrar agenda à frente">⤒</button>
  </body>
</html>
