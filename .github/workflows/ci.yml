# Testes + build: em cada push para main/master, em PRs para essas branches, ou manualmente (Run workflow).
#
# Rapidez: cache do Cargo (swatinem/rust-cache) + `build:ci` = release sem MSI/NSIS (só no workflow Release).

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install dependencies
        run: npm ci

      - name: Clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings

      - name: Cargo test
        run: cargo test --manifest-path src-tauri/Cargo.toml --no-fail-fast

      - name: Build Tauri (release, sem instaladores)
        run: npm run build:ci

      # Descarregar: Actions → run concluído → Artifacts → agenda-windows-x64 (zip com o .exe).
      - name: Upload .exe para download
        uses: actions/upload-artifact@v4
        with:
          name: agenda-windows-x64
          path: src-tauri/target/release/calendario-app.exe
          if-no-files-found: error
          retention-days: 30
