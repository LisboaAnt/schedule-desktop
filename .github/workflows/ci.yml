# Testes + build: em pull requests para main/master, ou manualmente (Run workflow).
# Não corre em cada push direto a main/master — evita duplicar com o Release e reduz minutos.
#
# Rapidez: cache do Cargo (swatinem/rust-cache) + `build:ci` = release sem MSI/NSIS (só no workflow Release).

name: CI

on:
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install dependencies
        run: npm ci

      - name: Clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings

      - name: Cargo test
        run: cargo test --manifest-path src-tauri/Cargo.toml --no-fail-fast

      - name: Build Tauri (release, sem instaladores)
        run: npm run build:ci
