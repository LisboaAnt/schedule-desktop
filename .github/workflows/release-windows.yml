# Gera instaladores Windows (.msi WiX + .exe NSIS) e publica na aba Releases do GitHub.
# Só corre quando disparas manualmente (Actions → Release (Windows) → Run workflow).
#
# Se aparecer "Resource not accessible by integration" ao criar a release, mesmo com
# "Read and write permissions" no repo:
#
# 1) Secret RELEASE_TOKEN (recomendado): cria um PAT pessoal com permissão de repositório:
#    GitHub → Settings (da tua conta) → Developer settings → Personal access tokens
#    → classic: scope "repo" OU fine-grained: este repo + Contents "Read and write".
#    Depois: repo schedule-desktop → Settings → Secrets and variables → Actions →
#    New repository secret → nome: RELEASE_TOKEN, valor: o PAT.
#    O passo abaixo usa RELEASE_TOKEN se existir; senão usa GITHUB_TOKEN.
#
# 2) Organização: github.com/orgs/ORG/settings/actions — "Workflow permissions" não pode
#    forçar só leitura em todos os repos (isso anula o do repo).
#
# 3) Rulesets / proteção de tags: Settings → Rules → Rulesets — ver se criação de tags
#    tipo v* está bloqueada para GitHub Actions.
#
# O passo mais lento é compilar Rust em release + empacotar. O rust-cache acelera runs seguintes
# (mesmo Cargo.lock). Para só um instalador, podes usar em `args`: `-b msi` ou `-b nsis`.

name: Release (Windows)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install dependencies
        run: npm ci

      # Opcional: em Settings → Secrets → Actions, define só GOOGLE_OAUTH_CLIENT_ID
      # para embutir no binário em compile-time (option_env). O client secret fica apenas no backend.
      - name: Build and upload to GitHub Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          # Chave privada Tauri (conteúdo do ficheiro .tauri/signing.key) — tem de corresponder ao pubkey em tauri.conf.json
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          tagName: v__VERSION__
          releaseName: Agenda v__VERSION__
          releaseBody: |
            **Windows x64** — descarrega o `.msi` ou o `.exe` (instalador NSIS).

            - **MSI**: instalação típica empresarial / silenciosa possível.
            - **Setup .exe**: assistente NSIS.

            Requisito: **WebView2** (normal no Windows 11; no 10, instalar [Evergreen](https://developer.microsoft.com/microsoft-edge/webview2/) se pedido).

            Builds não assinados: o SmartScreen pode mostrar aviso — «Mais informações» → «Executar na mesma».
          releaseDraft: false
          prerelease: false
          uploadUpdaterJson: true
          uploadWorkflowArtifacts: true
          args: --ci

      # Se o passo anterior falhar só na API do GitHub (permissões), os ficheiros já existem no runner.
      - name: Artefacto de reserva (MSI + setup .exe)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: agenda-windows-installers
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*-setup.exe
          if-no-files-found: ignore
          retention-days: 14
